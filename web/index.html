<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hubspot-Wefact</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        padding: 50px;
        background-color: #f4f7f6;
      }
      .container {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
      #status,
      #fetchResponse {
        margin-top: 20px;
        padding: 10px;
        border-radius: 4px;
        display: none;
      }
      .error {
        background-color: #f8d7da;
        color: #721c24;
      }
      .success {
        background-color: #d4edda;
        color: #155724;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Hubspot-Wefact service</h2>
      <label for="apiKey">Enter API Key</label>
      <input type="password" id="apiKey" placeholder="..." />
      <button onclick="fetchTasks()">Start Hubspot-Wefact</button>

      <div id="status"></div>
      <div id="fetchResponse">
        <button id="fetchResponseButton">Latest response</button>
        <div id="response"></div>
      </div>
    </div>

    <script>
      // Requests are same-origin: Caddy serves this page and reverse-proxies
      // /tasks* to the backend on the same host, so no API base URL is needed.
      const API_BASE = "";

      async function apiRequest(path, method) {
        const apiKey = document.getElementById("apiKey").value;
        try {
          const response = await fetch(`${API_BASE}${path}`, {
            method,
            headers: {
              Authorization: `Bearer ${apiKey}`,
              "Content-Type": "application/json",
            },
          });
          if (!response.ok) {
            showStatus(
              `Error: ${response.status} - ${response.statusText}`,
              "error",
            );
            return null;
          }
          return await response.json();
        } catch (err) {
          showStatus(
            "Connection failed. Ensure the service is running.",
            "error",
          );
          console.error(err);
          return null;
        }
      }

      async function fetchResponse(id) {
        const responseDiv = document.getElementById("response");
        const data = await apiRequest(`/tasks/${id}`, "GET");
        if (!data) return;
        responseDiv.textContent = data.output;
        responseDiv.style.display = "block";
      }

      async function fetchTasks() {
        const apiKey = document.getElementById("apiKey").value;
        const statusDiv = document.getElementById("status");
        const fetchResponseDiv = document.getElementById("fetchResponse");
        const responseButton = document.querySelector("#fetchResponseButton");
        const responseDiv = document.getElementById("response");

        // Reset UI
        statusDiv.style.display = "none";
        fetchResponseDiv.style.display = "none";
        responseDiv.textContent = "";

        if (!apiKey) {
          showStatus("Please enter an API key.", "error");
          return;
        }

        const data = await apiRequest("/tasks", "POST");
        if (!data) return;
        showStatus(`${data.message} (${data.task_id})`, data.status);
        responseButton.onclick = () => {
          fetchResponse(data.task_id);
        };
        fetchResponseDiv.style.display = "block";
      }

      function showStatus(msg, type) {
        const statusDiv = document.getElementById("status");
        statusDiv.textContent = msg;
        statusDiv.className = type;
        statusDiv.style.display = "block";
      }
    </script>
  </body>
</html>
